spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sebi_school_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update
    naming:
      physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
       dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
  error:
    include-stacktrace: never

application:
  jwt:
    tokenPrefix: "Bearer"
    tokenExpirationAfterDays: 7
    secretKey: ${JWT_SECRET_KEY:asdasdasdasdasd123344asdasdasdasdasasd12321332sadasXYZ0123456789ABCDEF}